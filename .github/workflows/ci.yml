name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  SOLANA_VERSION: "2.2.3"
  ANCHOR_VERSION: "0.32.1"
  NODE_VERSION: "20"
  SSS_TOKEN_PROGRAM_ID: "tCe3w68q2eo752dzozjGrV8rwhuynfz6T4HtquHf1Gz"
  SSS_HOOK_PROGRAM_ID: "A7UUA9Dbn9XokzuTqMCD9ka4y7x1pQBHJERa92dGAHKB"

jobs:
  build-programs:
    name: Build Programs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Cache Solana CLI
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: solana-${{ runner.os }}-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Cache Anchor CLI
        id: cache-anchor
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/anchor
          key: anchor-${{ runner.os }}-${{ env.ANCHOR_VERSION }}

      - name: Install Anchor CLI
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli

      - name: Run cargo fmt check
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy -- -W clippy::all

      - name: Build programs
        run: anchor build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: program-binaries
          path: |
            target/deploy/*.so
            target/idl/*.json
          retention-days: 1

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build-programs

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Cache Solana CLI
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: solana-${{ runner.os }}-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Create Solana keypair
        run: solana-keygen new --no-bip39-passphrase --silent

      - name: Set Solana to localhost
        run: solana config set --url localhost

      - name: Cache Anchor CLI
        id: cache-anchor
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/anchor
          key: anchor-${{ runner.os }}-${{ env.ANCHOR_VERSION }}

      - name: Install Anchor CLI
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: program-binaries
          path: target

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Start local validator with feature deactivation
        run: |
          solana-test-validator \
            --reset \
            --bind-address 127.0.0.1 \
            --deactivate-feature CxeBn9PVeeXbmjbNwLv6U4C6svNxnC4JX6mfkvgeMocM \
            --bpf-program ${{ env.SSS_TOKEN_PROGRAM_ID }} target/deploy/sss_token.so \
            --bpf-program ${{ env.SSS_HOOK_PROGRAM_ID }} target/deploy/sss_transfer_hook.so \
            &

      - name: Wait for validator to start
        run: sleep 5

      - name: Airdrop SOL to test wallet
        run: solana airdrop 100

      - name: Run program tests
        run: ANCHOR_PROVIDER_URL=http://127.0.0.1:8899 ANCHOR_WALLET=~/.config/solana/id.json npx ts-mocha -p ./tsconfig.json -t 1000000 "tests/**/*.ts"

      - name: Run SDK tests
        run: cd sdk/core && npx ts-mocha -p ../../tsconfig.json -t 1000000 "tests/**/*.ts"

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: node-${{ runner.os }}-

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Check Prettier formatting
        run: npx prettier --check "sdk/**/*.ts" "frontend/src/**/*.{ts,tsx}" "backend/src/**/*.ts" "tests/**/*.ts"
